[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "quant-ml"
version = "0.1.0"
description = "Optional machine-learning adapters for quantitative research"
requires-python = ">=3.11"
dependencies = ["quant-core"]

[project.optional-dependencies]
torch = ["torch"]

[tool.uv.sources]
quant-core = { workspace = true }

[tool.setuptools.packages.find]
where = ["src"]
